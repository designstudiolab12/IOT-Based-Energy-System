<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DINESH Energy Meter</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f4fbff;
}

header{
background:#0d6efd;
color:white;
padding:18px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.container{
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:12px;
padding:20px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

.card h3{
margin:0;
color:#0d6efd;
}

.value{
font-size:28px;
font-weight:bold;
margin-top:10px;
}

.bill{
font-size:30px;
color:green;
font-weight:bold;
}

.login-box{
max-width:400px;
margin:80px auto;
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:10px;
margin:10px 0;
}

button{
width:100%;
padding:10px;
background:#0d6efd;
color:white;
border:none;
cursor:pointer;
}

.graph{
background:white;
border-radius:12px;
padding:20px;
margin:20px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

footer{
text-align:center;
padding:12px;
background:#e9ecef;
margin-top:20px;
}

</style>

</head>

<body>

<div id="loginPage" class="login-box">

<h2>Login</h2>

<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>


<div id="dashboard" style="display:none;">

<header>
Smart Electricity Monitoring Dashboard
</header>

<div class="container">

<div class="card">
<h3>Today's Units</h3>
<div class="value" id="liveUnits">0</div>
</div>

<div class="card">
<h3>Weekly Units</h3>
<div class="value" id="weeklyUnits">0</div>
</div>

<div class="card">
<h3>Monthly Units</h3>
<div class="value" id="monthlyUnits">0</div>
</div>

<div class="card">
<h3>Today's Cost</h3>
<div class="bill" id="todayBill">₹0</div>
</div>

<div class="card">
<h3>Monthly Running Bill</h3>
<div class="bill" id="runningBill">₹0</div>
</div>

<div class="card">
<h3>Voltage</h3>
<div class="value" id="voltage">0 V</div>
</div>

<div class="card">
<h3>Current</h3>
<div class="value" id="current">0 A</div>
</div>

<div class="card">
<h3>Power</h3>
<div class="value" id="power">0 W</div>
</div>

</div>

<div class="graph">
<h3>Usage Graph</h3>
<canvas id="usageChart"></canvas>
</div>

<footer>
IoT Based Electricity Monitoring System
</footer>

</div>


<script>

function login(){

let user=document.getElementById("username").value;
let pass=document.getElementById("password").value;

if(user==="admin" && pass==="1234"){

document.getElementById("loginPage").style.display="none";
document.getElementById("dashboard").style.display="block";

}
else{
alert("Invalid Login");
}

}


const firebaseConfig = {

apiKey: "AIzaSyDw6ue8f2VQPLY-SfYSjQ-8wOXPCSDy7So",
authDomain: "dinesh-ebs-system.firebaseapp.com",
databaseURL: "https://dinesh-ebs-system-default-rtdb.firebaseio.com",
projectId: "dinesh-ebs-system",
storageBucket: "dinesh-ebs-system.firebasestorage.app",
messagingSenderId: "544411717146",
appId: "1:544411717146:web:0e1d121c3f5e49ba4a4ba3"

};

firebase.initializeApp(firebaseConfig);

const db=firebase.database();


function calculateBill(units){

let amount=0;

if(units<=100){
amount=units*1.5;
}
else if(units<=200){
amount=units*2.5;
}
else{
amount=units*4;
}

return amount.toFixed(2);

}


function fetchData(){

db.ref("energyData").on("value",function(snapshot){

const data=snapshot.val()||{};

let today=data.todayUnits || 0;
let weekly=data.weeklyUnits || 0;
let monthly=data.monthlyUnits || 0;

let voltage=data.voltage || 0;
let current=data.current || 0;
let power=data.power || 0;


document.getElementById("liveUnits").innerText=today+" Units";
document.getElementById("weeklyUnits").innerText=weekly+" Units";
document.getElementById("monthlyUnits").innerText=monthly+" Units";

document.getElementById("voltage").innerText=voltage+" V";
document.getElementById("current").innerText=current+" A";
document.getElementById("power").innerText=power+" W";


let todayBill=calculateBill(today);
let runningBill=calculateBill(monthly);

document.getElementById("todayBill").innerText="₹ "+todayBill;
document.getElementById("runningBill").innerText="₹ "+runningBill;

});

}


setInterval(fetchData,4000);

fetchData();

</script>

</body>
</html>
